<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/crud-style.css">
</head>
<body>
    <nav class="sidebar d-flex flex-column">
        <div class="brand">SecondVoice Admin</div>
        <ul class="nav flex-column mb-auto">
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li class="nav-item"><a href="index-goals.php" class="nav-link"><i class="fas fa-bullseye"></i> Gestion des Goals</a></li>
            <li class="nav-item"><a href="index-guides.php" class="nav-link active"><i class="fas fa-book"></i> Gestion des Guides</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-navbar">
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-dark text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                    <img src="https://ui-avatars.com/api/?name=Admin" width="32" class="rounded-circle me-2">
                    <strong>Admin</strong>
                </a>
            </div>
        </header>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Modifier le Guide #2</h2>
            <a href="index-guides.php" class="btn btn-outline-secondary shadow-sm">
                <i class="fas fa-arrow-left me-1"></i> Retour à la liste
            </a>
        </div>

        <div class="card card-custom">
            <div class="card-header-custom">
                <h5 class="mb-0">Mise à jour des ressources</h5>
            </div>
            <div class="card-body p-4">
                <form id="editGuideForm" class="needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Titre du guide <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" value="Procédure de prise de RDV en ligne" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Type de guide <span class="text-danger">*</span></label>
                            <select class="form-select" name="type" required>
                                <option value="Document">Document PDF/Word</option>
                                <option value="Tutoriel" selected>Tutoriel étape par étape</option>
                                <option value="Lien">Lien vers plateforme externe</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold">Objectif Parent (Goal ID) <span class="text-danger">*</span></label>
                            <select class="form-select" name="goal_id" required>
                                <option value="1" selected>#1 - Obtenir carte d'invalidité (En cours)</option>
                                <option value="2">#2 - Demande de fauteuil roulant (Attente)</option>
                                <option value="3">#3 - Inscription transport adapté (Terminé)</option>
                            </select>
                        </div>

                        <div class="col-md-12 mt-3">
                            <label class="form-label fw-bold">Contenu du guide <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="content" rows="6" required>Étape 1 : Se rendre sur le portail www.social.gov.tn
Étape 2 : Cliquer sur "Espace Citoyen"
Étape 3 : Saisir les informations demandées issues du dossier n°125</textarea>
                        </div>

                        <div class="col-12 mt-4 d-flex justify-content-end">
                            <button type="button" class="btn btn-light me-2" onclick="window.history.back();">Annuler</button>
                            <button type="submit" class="btn btn-primary-custom shadow-sm"><i class="fas fa-save me-1"></i> Mettre à jour le guide</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const guideId = urlParams.get('id');
            const pageTitle = document.querySelector('h2.fw-bold');
            
            if (guideId && parseInt(guideId) >= 3) {
                let mockGuides = JSON.parse(localStorage.getItem('mockGuides')) || [];
                let guide = mockGuides.find(g => g.id == guideId);
                
                if (guide) {
                    pageTitle.textContent = "Modifier le Guide #" + guide.id;
                    document.querySelector('input[name="title"]').value = guide.title;
                    document.querySelector('select[name="type"]').value = guide.type;
                    document.querySelector('select[name="goal_id"]').value = guide.goal_id;
                    document.querySelector('textarea[name="content"]').value = guide.content;
                }
            }

            const form = document.getElementById('editGuideForm');
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                } else {
                    event.preventDefault();
                    if (guideId && parseInt(guideId) >= 3) {
                        let mockGuides = JSON.parse(localStorage.getItem('mockGuides')) || [];
                        let index = mockGuides.findIndex(g => g.id == guideId);
                        
                        if (index !== -1) {
                            const formData = new FormData(form);
                            const updatedGuide = Object.fromEntries(formData.entries());
                            updatedGuide.id = parseInt(guideId);
                            
                            mockGuides[index] = updatedGuide;
                            localStorage.setItem('mockGuides', JSON.stringify(mockGuides));
                        }
                    }
                    alert('Modification du guide enregistrée localement !');
                    window.location.href = 'index-guides.php';
                }
                form.classList.add('was-validated');
            }, false);
        });
    </script>
</body>
</html>
